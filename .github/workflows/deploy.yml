name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_S3_BUCKET_URL=${{ secrets.NEXT_PUBLIC_S3_BUCKET_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USER: ${{ github.actor }}
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          GH_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
          GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GH_PAT,GH_USER,APP_IMAGE,DB_PASSWORD,BETTER_AUTH_SECRET,BETTER_AUTH_URL,GH_CLIENT_ID,GH_CLIENT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,OPENAI_API_KEY,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_S3_BUCKET_NAME
          script: |
            set -e
            mkdir -p ~/fit-manager && cd ~/fit-manager

            printf '%s\n' "DATABASE_URL=postgresql://fitmanager:${DB_PASSWORD}@db:5432/fitmanager" "BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}" "BETTER_AUTH_URL=${BETTER_AUTH_URL}" "GITHUB_CLIENT_ID=${GH_CLIENT_ID}" "GITHUB_CLIENT_SECRET=${GH_CLIENT_SECRET}" "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}" "OPENAI_API_KEY=${OPENAI_API_KEY}" "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}" "AWS_S3_BUCKET_NAME=${AWS_S3_BUCKET_NAME}" "NODE_ENV=production" > .env.app

            printf '%s\n' "POSTGRES_USER=fitmanager" "POSTGRES_PASSWORD=${DB_PASSWORD}" "POSTGRES_DB=fitmanager" > .env.db

            printf '%s\n' 'services:' '  app:' "    image: ${APP_IMAGE}" '    container_name: fit-manager-app' '    restart: unless-stopped' '    env_file: .env.app' '    ports:' '      - "3002:3000"' '    depends_on:' '      db:' '        condition: service_healthy' '  db:' '    image: postgres:17-alpine' '    container_name: fit-manager-postgres' '    restart: unless-stopped' '    env_file: .env.db' '    volumes:' '      - pgdata:/var/lib/postgresql/data' '    healthcheck:' '      test: ["CMD-SHELL", "pg_isready -U fitmanager -d fitmanager"]' '      interval: 5s' '      timeout: 5s' '      retries: 5' 'volumes:' '  pgdata:' > docker-compose.yml

            echo "$GH_PAT" | docker login ghcr.io -u "$GH_USER" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f

            echo "Waiting for services..."
            sleep 5
            curl -sf --retry 5 --retry-delay 3 --retry-all-errors http://localhost:3002 || (echo "App health check failed! Logs:" && docker logs fit-manager-app --tail 50 && exit 1)
            echo "fit-manager is healthy!"
